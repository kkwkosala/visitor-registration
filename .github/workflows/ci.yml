# GitHub Actions CI
# Runs on every push and pull request to main/develop
# Pipeline: Install → Lint → Build → Test

name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, develop]

env:
  NG_CLI_ANALYTICS: false   # suppress Angular CLI telemetry prompts in CI

jobs:
  ci:
    name: Lint · Build · Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        # Fails with exact file:line:rule output on lint errors

      - name: Build
        run: npm run build -- --configuration production
        env:
          # Placeholder env vars so the build doesn't fail in CI
          # Real values are never committed — see .env.example
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: placeholder-anon-key

      - name: Test
        run: npm test -- --watch=false
        # Angular 21 uses vitest — runs headlessly in Node, no browser needed
        # vitest auto-detects CI=true and disables watch mode

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            frontend/coverage/
            frontend/test-results/
          retention-days: 7
